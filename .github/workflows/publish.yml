name: Release Client SDK

on:
  push:
    branches:
      - main
    paths:
      - '**/*.ts'
      - '**/*.js'
      - 'package.json'
      - 'CHANGELOG.md'
      - 'release-please-config.json'
      - '.release-please-manifest.json'
      - '.github/workflows/publish.yml'
  workflow_dispatch: {}

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}

    steps:
      - name: Create or publish release
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    if: github.event_name == 'push' && needs.release-please.outputs.release_created == 'true'
    needs: release-please
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout code at release commit
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build package
        run: npm run build

      - name: Test
        run: npm test -- --runInBand

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Publish to NPM
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Output release trace
        run: |
          echo "Published $(node -p 'require("./package.json").name + "@" + require("./package.json").version')"
          echo "Source commit: $GITHUB_SHA"

  dry-run:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build package
        run: npm run build

      - name: Test
        run: npm test -- --runInBand

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Verify publish configuration
        run: npm publish --dry-run --access public
