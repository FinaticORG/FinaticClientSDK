name: Release Client SDK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and pack without publishing to NPM"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      version:
        description: "Optional release version. Defaults to the next patch version."
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    if: github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Resolve release mode
        id: mode
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "dry_run=${{ inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          else
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Guard publish ref
        shell: bash
        run: |
          if [[ "${{ steps.mode.outputs.dry_run }}" != "true" && "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "::error::Non-dry-run releases must run from refs/heads/main."
            exit 1
          fi

      - name: Prepare release version
        id: version
        shell: bash
        env:
          REQUESTED_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}
          DRY_RUN: ${{ steps.mode.outputs.dry_run }}
        run: |
          if [[ -n "$REQUESTED_VERSION" ]]; then
            npm version "$REQUESTED_VERSION" --no-git-tag-version
          else
            npm version patch --no-git-tag-version
          fi

          VERSION="$(node -p "require('./package.json').version")"
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          if [[ "$DRY_RUN" != "true" ]]; then
            if [[ -f CHANGELOG.md ]]; then
              EXISTING="$(cat CHANGELOG.md)"
            else
              EXISTING="# Changelog"
            fi
            if ! grep -q "## ${VERSION}" CHANGELOG.md 2>/dev/null; then
              printf '# Changelog\n\n## %s\n\n- Release from %s.\n\n%s\n' "$VERSION" "$GITHUB_SHA" "$(printf '%s' "$EXISTING" | sed '1{/^# Changelog$/d;}')" > CHANGELOG.md
            fi
          fi

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build package
        run: npm run build

      - name: Test
        run: npm test -- --runInBand

      - name: Pack release artifact
        run: npm pack

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: finatic-client-${{ steps.version.outputs.version }}
          path: finatic-client-*.tgz

      - name: Publish to NPM
        if: steps.mode.outputs.dry_run != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Open version bump pull request
        if: steps.mode.outputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="chore/release-v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          if [[ -f .release-please-manifest.json ]]; then
            printf '{\n  ".": "%s"\n}\n' "$VERSION" > .release-please-manifest.json
          fi
          git add package.json package-lock.json CHANGELOG.md .release-please-manifest.json || true
          if git diff --cached --quiet; then
            echo "No version/changelog changes to commit."
            exit 0
          fi
          git commit -m "chore(release): v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists locally."
          else
            git tag "$TAG"
          fi
          if ! git push -u origin "HEAD:${BRANCH}" --tags; then
            echo "::warning::Could not push release branch/tag after npm publish of v${VERSION}."
            exit 0
          fi
          if gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(release): v${VERSION}" \
            --body "$(cat <<EOF
          ## Summary
          - Sync package metadata after publishing \`@finatic/client@${VERSION}\` to npm.
          - Direct pushes to \`main\` are blocked by branch protection; this PR carries the version bump.

          ## Test plan
          - [ ] Confirm npm shows \`@finatic/client@${VERSION}\`
          - [ ] Merge this PR so \`main\` matches the published version
          EOF
          )"; then
            echo "Opened version bump PR for v${VERSION}."
          else
            echo "::warning::npm publish of v${VERSION} succeeded, but could not open the version bump PR (org may block Actions from creating PRs)."
          fi
