name: CI

on:
  push:
    branches: [main, develop, staging, fdx-account-consent-v1]
  pull_request:
    branches: [main, develop, staging, fdx-account-consent-v1]

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Unit tests with coverage gate
        run: npm run test:coverage -- --runInBand
